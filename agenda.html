<div id="tab-servicos" class="tab-content">
    <section class="form-section">
        <form id="servicoForm">
            <input type="hidden" id="servicoId">

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="servicoNome">Nome do serviço *</label>
                    <input type="text" id="servicoNome" class="form-control" required
                           placeholder="Ex: UBS mais próxima, Médico responsável, Farmácia">
                </div>

                <div class="form-group">
                    <label class="form-label" for="servicoTelefone">Telefone *</label>
                    <input type="text" id="servicoTelefone" class="form-control" required
                           placeholder="Ex: 192, 190, (12) 99999-9999">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="servicoEndereco">Endereço / Observação</label>
                <input type="text" id="servicoEndereco" class="form-control"
                       placeholder="Ex: Emergência 24h, Rua X nº 100, Clínica/Hospital">
            </div>

            <button type="submit" class="btn-save" id="btnServicoSalvar">
                💾 Salvar serviço
            </button>
        </form>
    </section>

    <table class="servicos-table">
        <thead>
            <tr>
                <th>Serviço</th>
                <th>Telefone</th>
                <th>Endereço / Observação</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaServicos"></tbody>
    </table>

    <p id="semServicos" class="no-itens" style="display:none;">
        Nenhum serviço cadastrado.
    </p>

    <p style="text-align:center;color:#666;font-size:0.95rem;margin-top:1rem;">
        📌 Cadastre contatos importantes como SAMU, Polícia, UBS, médico responsável,
        farmácia, cuidador reserva ou familiar de emergência.
    </p>
</div>
